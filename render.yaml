services:
  # Backend API
  - type: web
    name: ai-onboarding-api
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./onboarding.db
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*" # Change this to your Vercel frontend URL after deployment
